services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: imuniza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: imuniza
      POSTGRES_PASSWORD: imuniza
      POSTGRES_DB: imuniza
    ports:
      - "5433:5432"
    volumes:
      - imuniza_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imuniza -d imuniza"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: imuniza-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - imuniza_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  imuniza_pg:
  imuniza_redis:
