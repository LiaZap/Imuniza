services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-imuniza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-imuniza}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-imuniza} -d ${POSTGRES_DB:-imuniza}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-imuniza}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-imuniza}
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      UAZAPI_URL: ${UAZAPI_URL}
      UAZAPI_TOKEN: ${UAZAPI_TOKEN}
      UAZAPI_INSTANCE: ${UAZAPI_INSTANCE}
      UAZAPI_WEBHOOK_SECRET: ${UAZAPI_WEBHOOK_SECRET}
      API_PORT: 3001
      API_BASE_URL: ${API_BASE_URL}
      DASHBOARD_BASE_URL: ${DASHBOARD_BASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${DASHBOARD_BASE_URL}
      DEFAULT_TENANT_NAME: ${DEFAULT_TENANT_NAME:-Clinica Imuniza}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:3001
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
